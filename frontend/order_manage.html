<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Abkassieren</title>
<link rel="stylesheet" href="order_manage.css">
</head>
<body>

<div class="page">
    <header class="header">
        <div id="table" class="table-title"></div>
        <div class="subtitle">Teilzahlung</div>
    </header>

    <hr>

    <section class="list-wrap">
        <div class="list-header">
            <div>Artikel</div>
            <div>Preis</div>
            <div>Summe</div>
            <div>Auswahl</div>
        </div>

        <div id="orders" class="orders"></div>
    </section>

    <hr>

    <footer class="bottom">
        <div id="total" class="total-bar">Zu zahlen: 0,00 € | Rest: 0,00 €</div>

        <div class="action-row">
            <button class="pay-btn" onclick="pay()">Kassieren</button>
            <button class="back-btn" onclick="cancel()">Zurück</button>
        </div>
    </footer>
</div>

<script src="order_manage.js"></script>
</body>
</html>

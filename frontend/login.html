<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="layout.js?v=1"></script>
<link rel="stylesheet" href="design-tokens.css?v=1">
<link rel="stylesheet" href="layout-presets.css?v=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<title>Login</title>
<link rel="stylesheet" href="login.css?v=6">
<link rel="stylesheet" href="status.css?v=2">
</head>
<body>

<div class="container">
    <img class="logo" src="logo_clean.png?v=1" alt="Logo">
    <h1>Login</h1>

    <div class="label">Nutzer</div>
    <select id="user"></select>

    <input type="password" id="pin" placeholder="PIN">

    <button type="button" onclick="login()">Login</button>
    <button type="button" onclick="window.location.assign('order_status.html')" style="margin-top:10px">Orderstatus Viewer</button>
    <button type="button" onclick="window.location.assign('admin.html')" style="margin-top:10px">Zum Admin-Bereich</button>

    <div id="error"></div>
</div>

<script src="api_base.js?v=10"></script>
<script src="login_app.js?v=3"></script>
<script src="status.js?v=3"></script>
<script>
if (typeof openOrderStatusViewer !== "function") {
  function openOrderStatusViewer() { window.location.assign("order_status.html"); }
}
if (typeof goToAdmin !== "function") {
  function goToAdmin() { window.location.assign("admin.html"); }
}
</script>
</body>
</html>

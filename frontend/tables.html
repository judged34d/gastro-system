<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="layout.js?v=1"></script>
<link rel="stylesheet" href="design-tokens.css?v=8">
<link rel="stylesheet" href="layout-presets.css?v=1">
<title>Mein Bereich</title>
<link rel="stylesheet" href="tables.css?v=2">
<link rel="stylesheet" href="status.css?v=2">
</head>
<body>

<div class="page">

    <header class="header">
        <h1>Mein Bereich</h1>
        <div id="username" class="username"></div>
    </header>

    <hr>

    <section class="tables-frame">
        <div id="tables" class="tables-grid"></div>
    </section>

    <hr>

    <div class="bottom-bar">
        <section class="actions actions-bottom">
            <button type="button" class="primary-btn btn-with-badge" onclick="goToMyOrders()">
                <span id="myOrdersOpenBadge" class="btn-qty-badge" hidden aria-hidden="true"></span>
                <span class="btn-with-badge-label">Meine Bestellungen</span>
            </button>
            <button class="primary-btn" onclick="openTabs()">Alle Deckel</button>
        </section>

        <hr class="logout-sep">

        <button class="secondary-btn logout-btn" onclick="confirmLogout()">Logout</button>
    </div>

</div>

<script src="api_base.js?v=10"></script>
<script src="open_order_badges.js?v=1"></script>
<script src="tables.js?v=8"></script>
<script src="status.js?v=4"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ============================================================
[0000] LOGIN OVERLAY
============================================================ -->
<div id="loginOverlay">
    <div class="loginBox">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Passwort">
        <button onclick="checkLogin()">Login</button>
        <div id="loginError"></div>
    </div>
</div>

<!-- ============================================================
[1000] ADMIN CONTENT
============================================================ -->
<div id="adminContent" style="display:none;">

<h1>Admin</h1>

<!-- ============================================================
[1100] KATEGORIEN
============================================================ -->
<div class="block">
    <h2>Kategorien</h2>

    <input id="cat_name" placeholder="Name">
    <button onclick="addCategory()">+</button>

    <table>
        <tbody id="categories"></tbody>
    </table>
</div>

<!-- ============================================================
[1200] PRODUKTE
============================================================ -->
<div class="block">
    <h2>Produkte</h2>

    <input id="prod_name" placeholder="Name">
    <input id="prod_price" placeholder="Preis">
    <input id="prod_cat" placeholder="Kategorie ID">
    <button onclick="addProduct()">+</button>

    <table>
        <tbody id="products"></tbody>
    </table>
</div>

<!-- ============================================================
[1300] TISCHE
============================================================ -->
<div class="block">
    <h2>Tische</h2>

    <input id="table_name" placeholder="Tischname">
    <button onclick="addTable()">+</button>

    <table>
        <tbody id="tables"></tbody>
    </table>
</div>

<!-- ============================================================
[1400] BEDIENUNGEN + ZUWEISUNG
============================================================ -->
<div class="block">
    <h2>Bedienungen</h2>

    <input id="user_name" placeholder="Name">
    <input id="user_pin" placeholder="PIN">
    <button onclick="addUser()">+</button>

    <div id="users"></div>
</div>

</div>

<script src="admin.js"></script>
</body>
</html>
